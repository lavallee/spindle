schema_version = 1
id = "outcome-uat-calibration"
skill = "outcome-uat"
skill_path = "skill/SKILL.md"
runner = ["python", "runner.py"]
timeout_seconds = 10
seed = 20260715
min_held_out_cases = 10
min_improvement = 0.05
receipt_dir = "receipts"

[dimensions]
harness = "frozen-receipt-calibration"
model = "none"
purpose = "outcome-uat-calibration"

[acceptance]
